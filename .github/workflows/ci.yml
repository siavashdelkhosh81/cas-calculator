name: CI

# Build and run the full test suite on every pull request (and on pushes to
# main), so a change that breaks the calculator can never merge silently.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5"

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build
        run: opam exec -- dune build

      - name: Run tests
        run: opam exec -- dune runtest --force
